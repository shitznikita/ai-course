# Install as /etc/ssh/sshd_config.d/00-cosmetics-ai-hardening.conf only
# after key-based login for the deploy user has been verified separately.
PubkeyAuthentication yes
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitRootLogin prohibit-password

# The private web UI needs local (-L) forwarding, but not remote forwarding,
# SSH agent forwarding, X11, or layer-3 tunnels.
AllowTcpForwarding local
PermitOpen 127.0.0.1:8787
AllowAgentForwarding no
X11Forwarding no
PermitTunnel no
GatewayPorts no
