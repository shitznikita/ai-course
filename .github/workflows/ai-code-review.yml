name: AI code review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

# The review needs the base repository contents, PR metadata, and one sticky
# issue comment. Do not grant write access to contents, checks, actions, etc.
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # pull_request_target receives secrets. Never run it for a fork or a draft
    # PR, and never execute workflow/code from the PR head.
    if: >-
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      github.event.pull_request.base.repo.full_name == github.repository &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out the immutable base revision only
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "21"

      # The reviewed Kotlin application uses GitHub REST itself. Event fields
      # below are IDs only; every PR title/file/patch/content is re-fetched and
      # treated as inert data, never as executable workflow input.
      - name: Generate and publish the bounded review
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_TOKEN: ${{ github.token }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_AUTH_SCHEME: OAuth
          LLM_API_URL: https://api.eliza.yandex.net/openrouter/v1/chat/completions
          LLM_MODEL: meta-llama/llama-3.3-70b-instruct
        run: day-32-ai-code-review-kotlin/scripts/run-review.sh --args="ci"
